services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cashgame}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cashgame}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cashgame}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cashgame}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cashgame}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pgdata:
